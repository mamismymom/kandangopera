<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT : PETA KONSEP INTERAKTIF - STOIKIOMETRI</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #d9f0fe; /* Warna latar belakang luar kanvas */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Mencegah scroll */
            font-family: sans-serif;
        }

        /* Rumus ini mengunci panggung secara absolut ke rasio 16:9. 
           Panggung akan merespons ukuran browser/embed dan secara otomatis 
           membuat batas atas-bawah (letterbox) atau kiri-kanan (pillarbox) 
           jika layarnya tidak 16:9, tanpa men-stretch gambar.
        */
        #panggung-interaktif {
            position: relative;
            width: 100vw;
            max-width: calc(100vh * (16 / 9));
            height: 100vh;
            max-height: calc(100vw * (9 / 16));
            cursor: pointer;
            user-select: none;
            background-color: transparent;
        }

        /* Setup transisi Pop */
        .slide-interaktif {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transform: scale(0.95); /* Slide mengecil saat tersembunyi */
            pointer-events: none; /* Mencegah klik nyasar ke slide yang sembunyi */
            transition: opacity 250ms ease-out, transform 250ms ease-out; /* Durasi 250ms */
            z-index: 1;
        }

        /* Saat slide dipanggil */
        .slide-interaktif.aktif {
            opacity: 1;
            transform: scale(1); /* Efek Pop membesar ke ukuran normal */
            pointer-events: auto; /* Izinkan klik kembali */
            z-index: 10; /* Bawa ke layer paling atas */
        }

        .gambar-peta-konsep {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* Memastikan gambar tetap aman */
        }
    </style>
</head>
<body onload="initInteractiveMap()">

    <div id="panggung-interaktif">
        
        <div id="slide-utama" class="slide-interaktif aktif">
            <img src="slidemain.png" alt="slidemain: Stoikiometri Utama" class="gambar-peta-konsep">
        </div>
        
        <div id="slide-depan" class="slide-interaktif">
            <img src="slidefront.png" alt="slidefront: Peta Konsep Detail" class="gambar-peta-konsep">
        </div>
        
        <div id="slide-subup" class="slide-interaktif">
            <img src="slidesubup.png" alt="slidesubup: Detail Konsep Mol" class="gambar-peta-konsep">
        </div>
        
        <div id="slide-subdown" class="slide-interaktif">
            <img src="slidesubdown.png" alt="slidesubdown: Detail Pereaksi Pembatas" class="gambar-peta-konsep">
        </div>
        
    </div>

    <script>
        const slides = {
            utama: document.getElementById('slide-utama'),
            depan: document.getElementById('slide-depan'),
            subup: document.getElementById('slide-subup'),
            subdown: document.getElementById('slide-subdown')
        };
        
        let slideAktifId = 'utama';

        function showSlide(slideId) {
            // Hapus class aktif dari semua slide (memulai animasi keluar)
            for (const key in slides) {
                slides[key].classList.remove('aktif');
            }
            // Tambahkan class aktif ke slide tujuan (memulai animasi masuk pop 250ms)
            slides[slideId].classList.add('aktif');
            slideAktifId = slideId;
        }

        function handleStageClick(event) {
            const panggung = document.getElementById('panggung-interaktif');
            const rect = panggung.getBoundingClientRect();
            
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            const xPercent = (x / rect.width) * 100;
            const yPercent = (y / rect.height) * 100;

            const col = Math.ceil(xPercent / 6.25);
            const row = Math.ceil(yPercent / (100 / 9));

            // console.log(`Klik di grid: Kolom ${col}, Baris ${row}`); // Bisa di-uncomment jika ingin melihat koordinat

            handleNavigation(col, row);
        }

        function handleNavigation(col, row) {
            if (slideAktifId === 'utama') {
                if (col <= 4) { 
                    showSlide('depan');
                } else if (col >= 5 && row <= 5) { 
                    showSlide('subup');
                } else if (col >= 5 && row >= 6) { 
                    showSlide('subdown');
                }
            } else if (slideAktifId === 'depan') {
                if (col <= 5) { 
                    showSlide('utama');
                } else if (col >= 6 && row <= 5) { 
                    showSlide('subup');
                } else if (col >= 6 && row >= 6) { 
                    showSlide('subdown');
                }
            } else if (slideAktifId === 'subup' || slideAktifId === 'subdown') {
                if (col <= 7) { 
                    showSlide('depan');
                } else if (col >= 8) { 
                    showSlide('utama');
                }
            }
        }

        function initInteractiveMap() {
            const panggung = document.getElementById('panggung-interaktif');
            panggung.addEventListener('click', handleStageClick);
        }
    </script>
</body>
</html>
